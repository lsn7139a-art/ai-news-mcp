name: AI News Scheduler

# 每天北京时间早上8点执行 (UTC 00:00)
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  send-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
        
    - name: Run AI News System
      env:
        EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
        EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      run: |
        echo "Running AI news collection and sending email..."
        node src/index.js
        
    - name: Log result
      if: always()
      run: |
        if [ ${{ job.status }} == 'success' ]; then
          echo "✅ AI news sent successfully at $(date)"
        else
          echo "❌ AI news sending failed at $(date)"
        fi
        
    - name: Notify on failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          core.notice('AI news sending failed. Check the logs for details.')